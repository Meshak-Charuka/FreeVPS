name: Windows 6hr RDP

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Download & Setup Ngrok
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip
          
      - name: Authenticate Ngrok
        run: .\ngrok\ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          
      - name: Set Custom Password
        run: net user runneradmin MySecurePassword123!

      - name: Create Tunnel
        run: Start-Process Powershell -ArgumentList "-NoExit -Command '.\ngrok\ngrok.exe tcp 3389'"
        
      - name: Connection Details
        run: |
          $response = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels
          $address = $response.tunnels[0].public_url
          Write-Host "=========================================="
          Write-Host "RDP CONNECTION DETAILS"
          Write-Host "=========================================="
          Write-Host "Address:  $address"
          Write-Host "Username: runneradmin"
          Write-Host "Password: MySecurePassword123!"
          Write-Host "=========================================="
          Write-Host "Session will stay active for 6 hours."

      - name: Keep Alive (6 Hours)
        run: Start-Sleep -Seconds 21600
