name: Ubuntu SSH via Tailscale
on: 
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci # Optional: automatically tags the runner in your tailnet

      - name: Setting Up User and SSH
        run: |
          # Create the user and set password
          sudo useradd -m $LINUX_USERNAME
          echo "$LINUX_USERNAME:$LINUX_USER_PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo $LINUX_USERNAME
          
          # Ensure SSH is running
          sudo apt-get update && sudo apt-get install -y openssh-server
          sudo systemctl start ssh
        env:
          LINUX_USER_PASSWORD: ${{ secrets.LINUX_USER_PASSWORD }}
          LINUX_USERNAME: ${{ secrets.LINUX_USERNAME }}

      - name: Keep Alive (6 Hours)
        run: |
          echo "Machine is online! You can SSH using: ssh $LINUX_USERNAME@<tailscale-ip>"
          sleep 6h
