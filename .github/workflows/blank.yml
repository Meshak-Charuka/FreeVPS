name: Windows 6hr RDP

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Download & Setup Ngrok
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip
          
      - name: Authenticate Ngrok
        run: .\ngrok\ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          
      - name: Set Custom Password
        run: net user runneradmin MySecurePassword123!

      - name: Create Tunnel
        run: Start-Process Powershell -ArgumentList "-NoExit -Command '.\ngrok\ngrok.exe tcp 3389'"
        
      - name: Connection Details (with Retry)
        run: |
          Write-Host "Waiting for Ngrok to initialize..."
          $maxRetries = 15
          $retryCount = 0
          $response = $null

          while ($null -eq $response -and $retryCount -lt $maxRetries) {
              try {
                  $response = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels -ErrorAction Stop
              } catch {
                  $retryCount++
                  Start-Sleep -Seconds 3
                  Write-Host "Retrying Ngrok connection ($retryCount/$maxRetries)..."
              }
          }

          if ($null -ne $response) {
              $address = $response.tunnels[0].public_url
              # Remove 'tcp://' prefix if present for easier copying
              $cleanAddress = $address -replace "tcp://", ""
              
              Write-Host "=========================================="
              Write-Host "RDP CONNECTION DETAILS"
              Write-Host "=========================================="
              Write-Host "Address:  $cleanAddress"
              Write-Host "Username: runneradmin"
              Write-Host "Password: MySecurePassword123!"
              Write-Host "=========================================="
          } else {
              Write-Error "Ngrok failed to start. Please check your NGROK_AUTH_TOKEN."
              exit 1
          }

      - name: Keep Alive (6 Hours)
        run: Start-Sleep -Seconds 21600
